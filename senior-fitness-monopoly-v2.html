<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>長者健身大富翁</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontSize: {
            dice: ["clamp(5rem,18vw,12rem)", { lineHeight: "1" }],
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --ink: #0f172a;
      --cream: #fffbeb;
      --orange: #fb923c;
      --green: #4ade80;
      --blue: #38bdf8;
      --core: #fef3c7;
      --rest: #dcfce7;
      --chance: #e0f2fe;
      --fun: #fce7f3;
    }
    body {
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      background: var(--cream);
      color: var(--ink);
    }
    .board-shell {
      position: relative;
      width: 100%;
      max-width: 72rem;
      margin-left: auto;
      margin-right: auto;
    }
    .board-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      grid-template-rows: repeat(6, minmax(3.75rem, 1fr));
      gap: 0.35rem;
      width: 100%;
    }
    @media (min-width: 1024px) {
      .board-grid { min-height: 22rem; }
    }
    /**
     * 中央空洞 = 第 2～7 欄、第 2～5 列（與 BOARD_LAYOUT 中空對齊）
     * 以比例推算約略位置（含 gap 誤差可接受）
     */
    .dice-center-panel #diceFace {
      font-size: clamp(2.5rem, min(16vw, 18vh), 6.75rem);
      line-height: 1;
    }
    .dice-center-panel {
      position: absolute;
      z-index: 25;
      left: calc(12.5% + 0.18rem);
      right: calc(12.5% + 0.18rem);
      top: calc(16.67% + 0.18rem);
      bottom: calc(16.67% + 0.18rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0.5rem 0.35rem;
      border-radius: 1rem;
      background: linear-gradient(180deg, #fffbeb 0%, #ffedd5 100%);
      border: 4px solid #0f172a;
      box-shadow: 6px 6px 0 #0f172a, inset 0 0 0 3px rgba(251, 146, 60, 0.35);
      pointer-events: none;
    }
    .cell {
      border: 3px solid #0f172a;
      border-radius: 0.5rem;
      font-weight: 800;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.2rem;
      position: relative;
      min-height: 3.5rem;
      transition: box-shadow 0.15s ease, transform 0.1s ease;
    }
    .cell:active { transform: scale(0.98); }
    .cell-core { background: var(--core); }
    .cell-rest { background: var(--rest); }
    .cell-chance { background: var(--chance); }
    .cell-fun { background: var(--fun); }
    .cell-active {
      box-shadow: 0 0 0 5px #2563eb, 0 0 0 9px #fff;
      z-index: 2;
    }
    .game-pawn {
      width: clamp(1.5rem, 5vw, 2.25rem);
      height: clamp(1.5rem, 5vw, 2.25rem);
      flex-shrink: 0;
      filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.35));
    }
    .token-row {
      position: absolute;
      left: 0.15rem;
      right: 0.15rem;
      bottom: 0.1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.15rem;
      justify-content: center;
      align-items: flex-end;
      pointer-events: none;
      max-height: 55%;
    }
    .card-illustration {
      border: 4px solid #0f172a;
      border-radius: 1rem;
      background: linear-gradient(180deg, #eff6ff 0%, #fff 55%);
      overflow: hidden;
    }
    .card-illustration svg {
      display: block;
      width: 100%;
      height: auto;
      max-height: min(42vh, 280px);
    }
    @keyframes modal-in {
      from {
        transform: scale(0.94) translateY(12px);
        opacity: 0;
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }
    .modal-panel-animate {
      animation: modal-in 0.38s cubic-bezier(0.34, 1.2, 0.64, 1) both;
    }
    @keyframes dice-pop {
      0% { transform: scale(0.2) rotate(-18deg); opacity: 0; }
      55% { transform: scale(1.12) rotate(6deg); opacity: 1; }
      75% { transform: scale(0.95) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    @keyframes dice-glow {
      0%, 100% { filter: drop-shadow(0 0 0 transparent); }
      50% { filter: drop-shadow(0 0 22px rgba(251, 146, 60, 0.95)); }
    }
    .dice-animate {
      animation: dice-pop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both, dice-glow 1.1s ease-in-out 2;
    }
    .panel-card {
      border: 4px solid #0f172a;
      box-shadow: 8px 8px 0 #0f172a;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <!-- 頂部 -->
  <header class="shrink-0 border-b-4 border-slate-900 bg-gradient-to-r from-amber-200 via-orange-200 to-amber-100 px-3 py-4 lg:px-8">
    <div class="max-w-[100rem] mx-auto flex flex-col gap-3 xl:flex-row xl:items-end xl:justify-between">
      <div>
        <h1 class="text-4xl sm:text-5xl xl:text-6xl font-black tracking-tight text-slate-900 leading-tight">
          長者健身大富翁
        </h1>
        <p class="mt-1 text-2xl sm:text-3xl font-bold text-slate-800">
          邊走棋邊運動 · 慢慢做 · 量力而為
        </p>
      </div>
      <div class="flex flex-wrap gap-3 lg:gap-4 items-stretch">
        <div class="panel-card bg-white rounded-2xl px-4 py-3 min-w-[10rem]">
          <p class="text-xl font-black text-slate-600">難度</p>
          <p id="levelDisplay" class="text-5xl sm:text-6xl font-black text-orange-600 leading-none mt-1">L1</p>
          <p class="text-lg font-bold text-slate-600 mt-1">完成一圈後自動 L2</p>
        </div>
        <div class="panel-card bg-white rounded-2xl px-4 py-3 min-w-[10rem]">
          <p class="text-xl font-black text-slate-600">本組完成圈數</p>
          <p id="lapDisplay" class="text-5xl sm:text-6xl font-black text-emerald-600 leading-none mt-1">0</p>
        </div>
        <div class="panel-card bg-white rounded-2xl px-4 py-3 flex-1 min-w-[12rem]">
          <p class="text-xl font-black text-slate-600">現在輪到</p>
          <p id="groupDisplay" class="text-4xl sm:text-5xl font-black text-slate-900 leading-tight mt-1 flex items-center gap-2">
            <span id="groupSwatch" class="inline-block w-10 h-10 rounded-full border-4 border-slate-900 shrink-0"></span>
            <span id="groupName">紅組</span>
          </p>
          <p id="posLine" class="text-2xl font-bold text-slate-700 mt-2">位置：第 1 格</p>
        </div>
        <div class="panel-card bg-white rounded-2xl px-4 py-3 min-w-[10rem]">
          <p class="text-xl font-black text-slate-600">本組積分</p>
          <p id="scoreDisplay" class="text-5xl sm:text-6xl font-black text-sky-600 leading-none mt-1">0</p>
        </div>
      </div>
    </div>
  </header>

  <!-- 主區：骰子 + 地圖 + 動作卡 -->
  <main class="flex-1 px-2 py-4 lg:px-6">
    <div class="max-w-[100rem] mx-auto flex flex-col xl:flex-row gap-4 xl:gap-6">
      <!-- 左欄：棋盤（骰子顯示在棋盤正中央空洞） -->
      <div class="flex-1 flex flex-col gap-4 min-w-0">
        <section>
          <h2 class="text-3xl sm:text-4xl font-black text-center text-slate-900 mb-3">24 格棋盤（依序繞一圈）</h2>
          <p class="text-center text-xl sm:text-2xl font-bold text-slate-700 mb-2">
            中央為骰子點數 · ★ 核心肌力格 · 橘底休息 · 藍底機會
          </p>
          <div class="board-shell" aria-label="棋盤與骰子">
            <div id="board" class="board-grid" aria-label="健身大富翁棋盤"></div>
            <div class="dice-center-panel" aria-live="polite">
              <p class="text-xl sm:text-2xl lg:text-3xl font-black text-slate-800 mb-1 leading-tight">骰子點數</p>
              <p class="text-sm sm:text-lg font-bold text-slate-600 mb-2 leading-tight px-1">
                擲骰後先看中央數字，再帶領做動作
              </p>
              <div id="diceFace" class="dice-animate font-black text-slate-900 select-none leading-none my-1" role="img" aria-label="骰子點數">
                —
              </div>
              <p id="diceHint" class="mt-1 text-base sm:text-xl lg:text-2xl font-bold text-slate-800 max-w-full px-1 leading-snug">
                請用下方「電腦擲骰」或輸入 1–6
              </p>
            </div>
          </div>
        </section>
      </div>

      <!-- 右欄：動作說明卡（與彈窗同步） -->
      <aside class="w-full xl:w-[min(28rem,100%)] shrink-0">
        <div class="panel-card bg-white rounded-3xl p-5 sm:p-6 sticky top-4">
          <h2 class="text-3xl sm:text-4xl font-black text-slate-900 border-b-4 border-slate-900 pb-3 mb-4">動作說明卡</h2>
          <div id="cardTitle" class="text-4xl sm:text-5xl font-black text-orange-700 leading-tight mb-4">請先擲骰或選格</div>
          <div id="cardBody" class="space-y-5 text-3xl sm:text-4xl font-bold text-slate-900 leading-relaxed"></div>
        </div>
      </aside>
    </div>
  </main>

  <!-- 擲骰落地後：動作說明彈窗 -->
  <div
    id="actionModal"
    class="fixed inset-0 z-[100] hidden flex items-center justify-center p-3 sm:p-6"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalCardTitle"
  >
    <button
      type="button"
      id="actionModalBackdrop"
      class="absolute inset-0 bg-black/75 border-0 cursor-default"
      aria-label="關閉動作說明"
    ></button>
    <div
      id="actionModalPanel"
      class="relative z-10 w-full max-w-4xl max-h-[92vh] overflow-y-auto rounded-3xl border-4 border-slate-900 bg-amber-50 shadow-[12px_12px_0_#0f172a]"
    >
      <div class="sticky top-0 z-20 flex items-start justify-between gap-3 border-b-4 border-slate-900 bg-gradient-to-r from-amber-200 to-orange-100 px-4 py-4 sm:px-6">
        <h2 id="modalCardTitle" class="text-4xl sm:text-5xl font-black text-slate-900 leading-tight pr-2">動作說明</h2>
        <button
          type="button"
          id="actionModalClose"
          class="shrink-0 min-w-[3.5rem] min-h-[3.5rem] rounded-2xl border-4 border-slate-900 bg-white text-4xl font-black leading-none text-slate-900 shadow-[4px_4px_0_#0f172a] active:translate-x-0.5 active:translate-y-0.5"
          aria-label="關閉"
        >
          ×
        </button>
      </div>
      <div id="modalCardBody" class="px-4 py-5 sm:px-8 sm:py-8 space-y-5 text-3xl sm:text-4xl font-bold text-slate-900 leading-relaxed"></div>
    </div>
  </div>

  <!-- 底部控制 -->
  <footer class="shrink-0 border-t-4 border-slate-900 bg-slate-900 text-white px-3 py-5 lg:px-8">
    <div class="max-w-[100rem] mx-auto space-y-4">
      <p id="statusMsg" class="text-center text-2xl sm:text-3xl lg:text-4xl font-black text-amber-200 leading-snug">
        可搭配實體骰子：由工作人員輸入點數，或按電腦擲骰。
      </p>
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-12 gap-3 xl:gap-4 items-stretch">
        <button
          type="button"
          id="btnRoll"
          class="xl:col-span-3 min-h-[5.5rem] rounded-2xl border-4 border-white bg-orange-400 text-slate-900 text-3xl sm:text-4xl font-black shadow-[6px_6px_0_#fff] active:translate-x-1 active:translate-y-1"
        >
          電腦擲骰
        </button>
        <div class="xl:col-span-4 flex flex-col sm:flex-row gap-3 items-stretch">
          <label class="flex-1 flex flex-col gap-2 bg-slate-800 rounded-2xl border-4 border-white px-4 py-3">
            <span class="text-2xl font-black text-amber-200">實體骰子點數（1–6）</span>
            <input
              id="diceInput"
              type="number"
              inputmode="numeric"
              min="1"
              max="6"
              placeholder="輸入 1–6"
              class="text-4xl sm:text-5xl font-black text-slate-900 bg-white border-4 border-slate-900 rounded-xl px-3 py-2 w-full"
            />
          </label>
          <button
            type="button"
            id="btnApplyDice"
            class="sm:w-48 min-h-[5.5rem] rounded-2xl border-4 border-white bg-sky-400 text-slate-900 text-2xl sm:text-3xl font-black shadow-[6px_6px_0_#fff] active:translate-x-1 active:translate-y-1"
          >
            套用點數<br />前進
          </button>
        </div>
        <button
          type="button"
          id="btnDone"
          class="xl:col-span-2 min-h-[5.5rem] rounded-2xl border-4 border-white bg-lime-400 text-slate-900 text-3xl sm:text-4xl font-black shadow-[6px_6px_0_#fff] active:translate-x-1 active:translate-y-1"
        >
          完成動作
        </button>
        <button
          type="button"
          id="btnNext"
          class="xl:col-span-3 min-h-[5.5rem] rounded-2xl border-4 border-white bg-emerald-400 text-slate-900 text-3xl sm:text-4xl font-black shadow-[6px_6px_0_#fff] active:translate-x-1 active:translate-y-1"
        >
          下一組
        </button>
      </div>
      <div class="flex flex-wrap justify-center gap-3">
        <label class="text-2xl font-black flex items-center gap-2">
          <span>組數</span>
          <select id="groupCount" class="text-3xl font-black text-slate-900 bg-white border-4 border-white rounded-xl px-2 py-2">
            <option value="3">3 組</option>
            <option value="4" selected>4 組</option>
            <option value="5">5 組</option>
            <option value="6">6 組</option>
          </select>
        </label>
      </div>
    </div>
  </footer>

  <script>
    (function () {
      var SAFETY = "動作要慢，感覺肌肉用力但不要痛。頭暈、喘不過氣、胸口悶請立刻停止並告知工作人員。";

        4: { kind: "chance", name: "機會卡：再擲一次", desc: "本回合可再擲一次骰子前進（工作人員協助）。", area: "機會", l1: "再擲 1 次", l2: "再擲 1 次" },
        5: { kind: "core", coreId: 2 },
        6: { kind: "active", name: "原地踏步", desc: "扶穩桌椅，原地輕踏步。", area: "下肢循環、暖身", l1: "約 20 秒", l2: "約 30 秒" },

      var CORE = {
        1: {
          name: "椅子坐立",
          desc: "從坐姿慢慢站起再坐回。",
          area: "腿部、臀部；提升起立能力",

        4: {

          l1: "左右各 6 次",
          l2: "左右各 10 次",
        },
        5: {
          name: "坐姿踮腳",
          desc: "坐姿踮起腳跟。",
          area: "小腿",
          l1: "10 次",
          l2: "15 次",
        },
        6: {
          name: "坐姿手臂彎舉",
          desc: "坐姿雙手彎舉。",
          area: "手臂",

          l2: "左右各 12 次",
        },
        7: {
          name: "坐姿肩部推舉",
          desc: "坐姿向上推手。",

          l2: "左右各 10 次",
        },

        },
      };

      /** 動作示意（SVG）：8 核心 + 各情境格 */

        var c = CELLS[cell];
        if (c.kind === "core") {

            area: k.area,
            l1: k.l1,

          title: c.name,
          desc: c.desc,
          area: c.area,
          l1: c.l1,
          l2: c.l2,

        for (i = 0; i < n; i++) {
          state.groups.push({
            name: GROUPS_META[i].name,
            color: GROUPS_META[i].color,
            position: 1,
            score: 0,
            laps: 0,
          });
        }
        if (state.currentIdx >= n) state.currentIdx = 0;
        state.phase = "idle";
        state.mustReroll = false;
        state.canRoll = true;
        state.lastDice = null;
        closeActionModal();
        renderBoard();
        refreshHud();
        renderCard(state.groups[state.currentIdx].position, { openModal: false });
        setDiceDisplay("—", false);
        setStatus("請擲骰或輸入點數。完成動作後再換下一組。");
      }

      function moveGroup(g, steps) {
        var pos = g.position;
        var crossed = 0;
        var i;
        for (i = 0; i < steps; i++) {
          pos += 1;
          if (pos > 24) {
            pos = 1;
            crossed += 1;
          }
        }
        g.position = pos;
        if (crossed > 0) {
          g.laps += crossed;
        }
      }

      function currentGroup() {
        return state.groups[state.currentIdx];

        var g = currentGroup();

        el("groupSwatch").style.background = g.color;

        el("lapDisplay").textContent = String(g.laps);
        el("scoreDisplay").textContent = String(g.score);
        el("posLine").textContent = "位置：第 " + g.position + " 格";

        var node = el("diceFace");
        node.textContent = value === null || value === undefined ? "—" : String(value);
        node.classList.remove("dice-animate");
        void node.offsetWidth;
        if (animate) node.classList.add("dice-animate");
      }

      function openActionModal() {
        var modal = el("actionModal");
        var panel = el("actionModalPanel");
        modal.classList.remove("hidden");
        document.body.style.overflow = "hidden";
        panel.classList.remove("modal-panel-animate");
        void panel.offsetWidth;
        panel.classList.add("modal-panel-animate");
        window.setTimeout(function () {
          el("actionModalClose").focus();
        }, 40);
      }

      function closeActionModal() {
        el("actionModal").classList.add("hidden");
        document.body.style.overflow = "";
      }

      function renderCard(cell, opts) {
        opts = opts || {};
        var g = currentGroup();
        var info = resolveCell(cell);
        var title = "第 " + cell + " 格｜" + info.title;
        var html = buildCardBodyHtml(cell, g);
        el("cardTitle").textContent = title;
        el("modalCardTitle").textContent = title;
        el("cardBody").innerHTML = html;
        el("modalCardBody").innerHTML = html;
        if (opts.openModal) openActionModal();
      }

      function groupsOnCell(cell) {
        return state.groups
          .map(function (g, i) {
            return { g: g, i: i };
          })
          .filter(function (x) {
            return x.g.position === cell;
          });
      }

      function renderBoard() {
        var board = el("board");
        board.innerHTML = "";
        var gcur = currentGroup();
        var r, c;
        for (r = 0; r < 6; r++) {
          for (c = 0; c < 8; c++) {
            if (!BOARD_LAYOUT[r][c]) {
              var spacer = document.createElement("div");
              spacer.style.gridColumn = c + 1;
              spacer.style.gridRow = r + 1;
              spacer.className = "min-h-[2.5rem]";
              board.appendChild(spacer);
              continue;
            }
            var cellNum = null;
            var k;
            for (k in CELL_NUMBER_AT) {
              if (CELL_NUMBER_AT[k].c === c && CELL_NUMBER_AT[k].r === r) {
                cellNum = parseInt(k, 10);
                break;
              }
            }
            var ce = CELLS[cellNum];
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "cell pb-9 sm:pb-10 " + cellUiClass(ce);
            if (cellNum === gcur.position) btn.classList.add("cell-active");
            btn.style.gridColumn = c + 1;
            btn.style.gridRow = r + 1;
            btn.dataset.cell = String(cellNum);
            var star = ce.kind === "core" ? '<span class="absolute top-0.5 right-0.5 text-lg font-black text-amber-800">★</span>' : "";
            btn.innerHTML =
              star +
              '<span class="text-xl sm:text-2xl lg:text-3xl leading-none">' +
              cellNum +
              "</span>" +
              '<span class="text-xs sm:text-sm lg:text-base text-center font-black leading-tight mt-0.5 px-0.5">' +
              shortName(cellNum) +
              "</span>" +
              '<span class="token-row" data-tok="' +
              cellNum +
              '"></span>';
            btn.addEventListener("click", function () {
              var cn = parseInt(btn.dataset.cell, 10);
              renderCard(cn, { openModal: true });
            });
            board.appendChild(btn);
          }
        }
        var n;
        for (n = 1; n <= 24; n++) {
          var holder = document.querySelector('[data-tok="' + n + '"]');
          if (!holder) continue;
          holder.innerHTML = groupsOnCell(n)
            .map(function (x) {
              return pawnSvg(x.g.color, x.g.name);
            })
            .join("");
        }
      }

      function applyLandingEffects() {
        var g = currentGroup();
        var cell = g.position;
        var c = CELLS[cell];
        if (state.mustReroll) {
          state.mustReroll = false;
        }
        if (c.score) {
          g.score += c.score;
        }
        if (cell === 4) {
          state.mustReroll = true;
          setStatus("機會卡：請再擲一次骰子（同一組回合內），移動後再按「完成動作」。");
        } else {
          setStatus("請帶領完成格子內容，然後按「完成動作」。");
        }
        state.canRoll = state.mustReroll;
        refreshHud();
        renderCard(cell, { openModal: true });
      }

      function runDice(value) {
        if (state.phase === "busy") return;
        if (!state.canRoll) {
          setStatus("此組已擲骰完成。請先按「完成動作」，再按「下一組」換下一隊。");
          return;
        }
        if (value < 1 || value > 6 || value !== value) {
          setStatus("請輸入 1 到 6 的整數。");
          return;
        }
        state.phase = "busy";
        state.lastDice = value;
        setDiceDisplay(value, true);
        el("diceHint").textContent = "點數：" + value + " — 前進 " + value + " 格";

        window.setTimeout(function () {
          var g = currentGroup();
          moveGroup(g, value);
          refreshHud();
          renderBoard();
          applyLandingEffects();
          state.phase = "idle";
        }, 1200);
      }

      el("btnRoll").addEventListener("click", function () {
        if (state.phase === "busy") return;
        var v = 1 + Math.floor(Math.random() * 6);
        runDice(v);
      });

      el("btnApplyDice").addEventListener("click", function () {
        var raw = el("diceInput").value.trim();
        var v = parseInt(raw, 10);
        runDice(v);
      });

      el("btnDone").addEventListener("click", function () {
        if (state.mustReroll) {
          setStatus("機會卡尚未完成：請先再擲一次（電腦或輸入），移動後再按「完成動作」。");
          return;
        }
        closeActionModal();
        setStatus("做得很好！若此組回合結束，請按「下一組」。");
      });

      el("btnNext").addEventListener("click", function () {
        if (state.mustReroll) {
          setStatus("此組仍有「再擲一次」未完成，請先擲骰並完成移動。");
          return;
        }
        state.currentIdx = (state.currentIdx + 1) % state.groups.length;
        state.canRoll = true;
        refreshHud();
        renderBoard();
        renderCard(currentGroup().position, { openModal: false });
        setStatus("換「" + currentGroup().name + "」。請擲骰或輸入點數。");
      });

      el("groupCount").addEventListener("change", buildGroups);

      el("actionModalClose").addEventListener("click", closeActionModal);
      el("actionModalBackdrop").addEventListener("click", closeActionModal);
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && !el("actionModal").classList.contains("hidden")) closeActionModal();
      });

      buildGroups();
    })();
  </script>
</body>
</html>
